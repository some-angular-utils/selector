@if(formControlItem){
<div class="sau-input">
    
    <label class="sau-input__label">
        {{label}}
    
        <input [type]="type" 
            [placeholder]="placeholder" 
            [formControl]="inputControl" 
            class="sau-input__field">
    </label>

    @if(formControlItem.invalid && (formControlItem.touched || formControlItem.dirty)){
    <div class="sau-input__error">
        Campo obligatorio
    </div>
    }

</div>
}
