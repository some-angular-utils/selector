@if (formControlItem) {
<div class="sau-select">

    @if (label) {
    <span (click)="openDropdown($event)" class="sau-select__label">
        {{ label }}
    </span>
    }

    <div class="sau-select__wrapper" (click)="openDropdown($event)">

        <input #selectInput type="text" [placeholder]="placeholder" [formControl]="searchControl"
            class="sau-select__input">

        <div class="sau-select__arrow">
            <svg [class.is-open]="isOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
        </div>

        @if (isOpen) {
        <div class="sau-select__dropdown custom-scrollbar">

            @for (option of filteredOptions; track option[bindValue]) {
            <button type="button" (click)="selectOption(option); $event.stopPropagation()" class="sau-select__option"
                [class.is-selected]="isSelected(option)">

                <div class="sau-select__option-left">
                    @if (isMultiple) {
                    <div class="sau-select__checkbox" [class.is-checked]="isSelected(option)"
                        [class.is-unselected]="!isSelected(option)">
                        <svg [class.is-active]="isSelected(option)" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    }

                    <div class="sau-select__option-text">
                        <span class="title">
                            {{ option[bindLabel] }}
                        </span>
                        @if (bindSubLabel && option[bindSubLabel]) {
                        <span class="subtitle">
                            REF: {{ option[bindSubLabel] }}
                        </span>
                        }
                    </div>
                </div>

                <div class="sau-select__option-right">
                    @if (bindExtra && option[bindExtra] !== undefined) {
                    <span class="sau-select__extra-text" [class.is-selected]="isSelected(option)">
                        {{ option[bindExtra] }}€
                    </span>
                    }
                    @if (!isMultiple && isSelected(option)) {
                    <span class="sau-select__check-icon">✓</span>
                    }
                </div>
            </button>
            } @empty {
            <div class="sau-select__empty">
                No se encontraron resultados
            </div>
            }
        </div>
        }
    </div>

</div>
}
